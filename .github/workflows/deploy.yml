name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DATABASE_URL,AUTH_SECRET
          script: |
            set -e
            cd /var/www/fce-quiz
            git fetch origin main
            git reset --hard origin/main
            cd web
            npm install
            export DATABASE_URL="$DATABASE_URL"
            export AUTH_SECRET="$AUTH_SECRET"
            DATABASE_URL="$DATABASE_URL" npx tsx src/db/migrate.ts
            npm run build
            pm2 reset fce-quiz || true
            pm2 reload /var/www/fce-quiz/web/ecosystem.config.js --update-env || pm2 start /var/www/fce-quiz/web/ecosystem.config.js --update-env
            pm2 save
            sleep 5
            pm2 status
            echo "Deploy done at $(date)"
